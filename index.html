<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="全球实时热点事件聚合 · 一站式追踪国际新闻、科技社区与国内热搜">
  <title>全球实时热点事件 · Global Hotspots</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>◈</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部控制区 -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true"></div>
        <div>
          <h1>全球实时热点事件</h1>
          <div class="sub">Global Realtime Hotspots Tracker</div>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="ctrls">
        <div class="clock" id="clock">--:--:--</div>
        <div class="search field">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="搜索全部热点…" autocomplete="off">
          <span class="clr" id="clearSearch" title="清空">×</span>
        </div>
        <label class="field" title="自动刷新">
          <span>自动</span>
          <span class="switch"><input type="checkbox" id="autoToggle"><i></i></span>
        </label>
        <label class="field" title="刷新间隔">
          <span>每</span>
          <select id="intervalSel">
            <option value="300000">5 分钟</option>
            <option value="600000">10 分钟</option>
            <option value="900000">15 分钟</option>
            <option value="1800000">30 分钟</option>
          </select>
        </label>
        <button class="btn" id="refreshBtn">↻ 刷新全部</button>
        <button class="btn" id="themeToggle" title="切换主题">🌙</button>
      </div>
    </div>
  </header>

  <!-- 分类标签 -->
  <div class="tabs-wrap" id="tabs"></div>

  <!-- 状态条 -->
  <div class="status-bar" id="status">正在初始化…</div>

  <!-- 卡片网格 -->
  <main class="grid" id="cards"></main>

  <!-- 页脚 -->
  <footer class="foot">
    数据来源：BBC · NYT · The Guardian · NPR · Deutsche Welle · CNBC · Hacker News · Google News · 微博 · 知乎 · 百度 · 哔哩哔哩 · 抖音 · 今日头条<br>
    仅作信息聚合展示，版权归原作者所有 · 静态前端直连公开 API，单源失败不影响其它源 · 部分国内源需在本机网络可达时显示
  </footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
